apiVersion: "clickhouse.altinity.com/v1"
kind: ClickHouseInstallation
metadata:
  name: chi-test-2
  namespace: clickhouse-2
spec:
  configuration:
    profiles:
      # readonly=1 (built-in default) blocks changing settings via SETTINGS clause,
      # which breaks Grafana panels that send `SETTINGS skip_unavailable_shards=1`.
      # readonly=2 still forbids INSERT/ALTER/DDL, but allows settings overrides.
      readonly/readonly: 2
    users:
      monitoring/password: "monitoring"
      monitoring/networks/ip:
        - "::/0"
      monitoring/profile: readonly
      # See docs/clickhouse-backup-setup.md — same pattern as chi-test.
      backup/password: "backup"
      backup/networks/ip:
        - "127.0.0.1"
        - "::1"
      backup/profile: default
    clusters:
      - name: "test2"
        templates:
          podTemplate: pod-template-with-backup
          dataVolumeClaimTemplate: clickhouse-data
        layout:
          shardsCount: 1
          replicasCount: 2
  templates:
    podTemplates:
      - name: pod-template-with-backup
        spec:
          containers:
            - name: clickhouse
              image: clickhouse/clickhouse-server:latest
            - name: clickhouse-backup
              image: altinity/clickhouse-backup:stable
              command:
                - clickhouse-backup
              args:
                - server
                - --watch
                - --watch-interval=12h
                - --full-interval=24h
              ports:
                - name: backup-api
                  containerPort: 7171
              resources:
                requests:
                  cpu: 50m
                  memory: 128Mi
                limits:
                  cpu: 250m
                  memory: 512Mi
              env:
                - name: POD_NAME
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.name
                - name: CLICKHOUSE_HOST
                  value: "127.0.0.1"
                - name: CLICKHOUSE_PORT
                  value: "9000"
                - name: CLICKHOUSE_USERNAME
                  value: "backup"
                - name: REMOTE_STORAGE
                  value: "s3"
                - name: S3_ENDPOINT
                  value: "http://minio.minio.svc.cluster.local:9000"
                - name: S3_BUCKET
                  value: "clickhouse-backups"
                - name: S3_PATH
                  value: "chi-test-2/$(POD_NAME)"
                - name: S3_REGION
                  value: "us-east-1"
                - name: S3_FORCE_PATH_STYLE
                  value: "true"
                - name: S3_DISABLE_SSL
                  value: "true"
                - name: BACKUPS_TO_KEEP_REMOTE
                  value: "7"
                - name: ALLOW_EMPTY_BACKUPS
                  value: "true"
                - name: API_LISTEN
                  value: ":7171"
                - name: API_ENABLE_METRICS
                  value: "true"
              envFrom:
                - secretRef:
                    name: clickhouse-backup-s3
    volumeClaimTemplates:
      - name: clickhouse-data
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 2Gi
