{{- if .Values.walgSecretStub }}
{{/*
configKubernetes.pod_environment_secret in postgres/operator/postgres-operator-values.yaml is a
single fixed secret name ("walg-config") that Patroni reads from EVERY managed cluster's own
namespace when generating pod env vars — even clusters that don't use WAL-G at all fail
statefulset creation without it ("could not read Secret PodEnvironmentSecretName ... not found").
The "postgres" namespace already has a real walg-config Secret created manually with actual S3
credentials (see values-step3-walg.yaml) — only a release in a namespace without that real secret
(e.g. values-postgres2-pgexporter.yaml) needs this empty stub.
*/}}
apiVersion: v1
kind: Secret
metadata:
  name: walg-config
  namespace: {{ .Values.namespace }}
type: Opaque
data: {}
{{- end }}
