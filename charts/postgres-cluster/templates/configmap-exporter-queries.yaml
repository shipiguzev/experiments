apiVersion: v1
kind: ConfigMap
metadata:
  name: postgresql-exporter-custom-queries
  namespace: {{ .Values.namespace }}
data:
  queries.yaml: |
    pg_extension:
      query: |
        SELECT current_database()                    AS datname,
               extname,
               extversion,
               extnamespace::regnamespace::text       AS schemaname,
               1                                       AS installed
        FROM pg_extension;
      metrics:
        - datname:
            usage: "LABEL"
            description: "Database the extension is installed in"
        - extname:
            usage: "LABEL"
            description: "Extension name"
        - extversion:
            usage: "LABEL"
            description: "Installed extension version"
        - schemaname:
            usage: "LABEL"
            description: "Schema the extension is installed in"
        - installed:
            usage: "GAUGE"
            description: "Extension is installed (always 1)"

    pg_partman_partitions:
      query: |
        SELECT
          current_database()                                             AS datname,
          pc.parent_table,
          (SELECT count(*) FROM partman.show_partitions(pc.parent_table)) AS partition_count
        FROM partman.part_config pc;
      metrics:
        - datname:
            usage: "LABEL"
            description: "Database the partition set lives in"
        - parent_table:
            usage: "LABEL"
            description: "pg_partman managed parent table (schema-qualified)"
        - partition_count:
            usage: "GAUGE"
            description: "Number of partitions currently attached to this parent table (pg_partman)"

    pg_statio_user_tables:
      query: |
        SELECT current_database() datname, schemaname, relname, heap_blks_read, heap_blks_hit, idx_blks_read,
          idx_blks_hit, toast_blks_read, toast_blks_hit, tidx_blks_read, tidx_blks_hit
          FROM pg_statio_user_tables
      cache_seconds: 300
      metrics:
        - datname:
            usage: "LABEL"
            description: "Name of current database"
        - schemaname:
            usage: "LABEL"
            description: "Name of the schema that this table is in"
        - relname:
            usage: "LABEL"
            description: "Name of this table"
        - heap_blks_read:
            usage: "COUNTER"
            description: "Number of disk blocks read from this table"
        - heap_blks_hit:
            usage: "COUNTER"
            description: "Number of buffer hits in this table"
        - idx_blks_read:
            usage: "COUNTER"
            description: "Number of disk blocks read from all indexes on this table"
        - idx_blks_hit:
            usage: "COUNTER"
            description: "Number of buffer hits in all indexes on this table"
        - toast_blks_read:
            usage: "COUNTER"
            description: "Number of disk blocks read from this table's TOAST table (if any)"
        - toast_blks_hit:
            usage: "COUNTER"
            description: "Number of buffer hits in this table's TOAST table (if any)"
        - tidx_blks_read:
            usage: "COUNTER"
            description: "Number of disk blocks read from this table's TOAST table indexes (if any)"
        - tidx_blks_hit:
            usage: "COUNTER"
            description: "Number of buffer hits in this table's TOAST table indexes (if any)"

    pg_stat_user_tables:
      query: |
        SELECT
          current_database() datname,
          schemaname,
          relname,
          seq_scan,
          seq_tup_read,
          idx_scan,
          idx_tup_fetch,
          n_tup_ins,
          n_tup_upd,
          n_tup_del,
          n_tup_hot_upd,
          n_live_tup,
          n_dead_tup,
          n_mod_since_analyze,
          COALESCE(last_vacuum, '1970-01-01Z') as last_vacuum,
          COALESCE(last_autovacuum, '1970-01-01Z') as last_autovacuum,
          COALESCE(last_analyze, '1970-01-01Z') as last_analyze,
          COALESCE(last_autoanalyze, '1970-01-01Z') as last_autoanalyze,
          vacuum_count,
          autovacuum_count,
          analyze_count,
          autoanalyze_count
        FROM
          pg_stat_user_tables
      cache_seconds: 300
      metrics:
        - datname:
            usage: "LABEL"
            description: "Name of current database"
        - schemaname:
            usage: "LABEL"
            description: "Name of the schema that this table is in"
        - relname:
            usage: "LABEL"
            description: "Name of this table"
        - seq_scan:
            usage: "COUNTER"
            description: "Number of sequential scans initiated on this table"
        - seq_tup_read:
            usage: "COUNTER"
            description: "Number of live rows fetched by sequential scans"
        - idx_scan:
            usage: "COUNTER"
            description: "Number of index scans initiated on this table"
        - idx_tup_fetch:
            usage: "COUNTER"
            description: "Number of live rows fetched by index scans"
        - n_tup_ins:
            usage: "COUNTER"
            description: "Number of rows inserted"
        - n_tup_upd:
            usage: "COUNTER"
            description: "Number of rows updated"
        - n_tup_del:
            usage: "COUNTER"
            description: "Number of rows deleted"
        - n_tup_hot_upd:
            usage: "COUNTER"
            description: "Number of rows HOT updated (i.e., with no separate index update required)"
        - n_live_tup:
            usage: "GAUGE"
            description: "Estimated number of live rows"
        - n_dead_tup:
            usage: "GAUGE"
            description: "Estimated number of dead rows"
        - n_mod_since_analyze:
            usage: "GAUGE"
            description: "Estimated number of rows changed since last analyze"
        - last_vacuum:
            usage: "GAUGE"
            description: "Last time at which this table was manually vacuumed (not counting VACUUM FULL)"
        - last_autovacuum:
            usage: "GAUGE"
            description: "Last time at which this table was vacuumed by the autovacuum daemon"
        - last_analyze:
            usage: "GAUGE"
            description: "Last time at which this table was manually analyzed"
        - last_autoanalyze:
            usage: "GAUGE"
            description: "Last time at which this table was analyzed by the autovacuum daemon"
        - vacuum_count:
            usage: "COUNTER"
            description: "Number of times this table has been manually vacuumed (not counting VACUUM FULL)"
        - autovacuum_count:
            usage: "COUNTER"
            description: "Number of times this table has been vacuumed by the autovacuum daemon"
        - analyze_count:
            usage: "COUNTER"
            description: "Number of times this table has been manually analyzed"
        - autoanalyze_count:
            usage: "COUNTER"
            description: "Number of times this table has been analyzed by the autovacuum daemon"

    pg_autovacuum_wraparound:
      query: "SELECT count(*) as count FROM pg_stat_activity WHERE query LIKE '%%wraparound%%' and state != 'idle' and pid != pg_backend_pid()"
      master: true
      cache_seconds: 30
      metrics:
        - count:
            usage: "GAUGE"
            description: "Count of only autovacuum to prevent wraparound processes"

    pg_stat_user_index:
      query: "SELECT schemaname, relname, indexrelname, idx_scan, idx_tup_read, idx_tup_fetch FROM pg_stat_user_indexes"
      master: true
      cache_seconds: 300
      metrics:
        - schemaname:
            usage: "LABEL"
            description: "Name of the schema that this index is in"
        - relname:
            usage: "LABEL"
            description: "Name of this table"
        - indexrelname:
            usage: "LABEL"
            description: "Name of this index"
        - idx_scan:
            usage: "COUNTER"
            description: "Number of index scans initiated on this index"
        - idx_tup_read:
            usage: "COUNTER"
        - idx_tup_fetch:
            usage: "COUNTER"

    pg_cron_failed_jobs:
      query: "SELECT COUNT(*) as count FROM cron.job_run_details WHERE status = 'failed' AND NOW() - end_time <= INTERVAL '24 hours'"
      master: true
      cache_seconds: 21600
      metrics:
        - count:
            usage: "GAUGE"
            description: "Number of pg_cron failed jobs"

    pg_partitions_missing:
      query: |
        WITH sections_raw AS (
          SELECT
            ns_p.nspname AS parent_schema,
            parent.relname AS parent,
            ns_c.nspname AS child_schema,
            child.relname AS child,
            pg_get_expr(child.relpartbound, child.oid, true)::TEXT AS range_desc
          FROM pg_inherits
          JOIN pg_class parent ON pg_inherits.inhparent = parent.oid
          JOIN pg_class child ON pg_inherits.inhrelid = child.oid
          JOIN pg_namespace ns_p ON ns_p.oid = parent.relnamespace
          JOIN pg_namespace ns_c ON ns_c.oid = child.relnamespace
          WHERE parent.reltype != 0
        ),
        sections AS (
          SELECT
            parent_schema,
            parent,
            child_schema,
            child,
            CASE WHEN range_desc LIKE 'FOR VALUES FROM (''%%' THEN SUBSTRING(range_desc FROM 19 FOR 10)::DATE END AS range_from,
            CASE WHEN range_desc LIKE 'FOR VALUES FROM (''%%' THEN SUBSTRING(range_desc FROM 46 FOR 10)::DATE END AS range_to
          FROM sections_raw
        ),
        days AS (
          SELECT generate_series(CURRENT_DATE, CURRENT_DATE + INTERVAL '7 day', INTERVAL '1 day') AS day
        )
        SELECT DISTINCT
          st.parent AS parent_table,
          COUNT(DISTINCT st.parent) AS count
        FROM days d
        CROSS JOIN sections st
        WHERE NOT EXISTS (
          SELECT 1 FROM sections s
          WHERE st.parent_schema = s.parent_schema
            AND st.parent = s.parent
            AND s.range_to > d.day
            AND s.range_from <= d.day
        )
        GROUP BY st.parent
      master: true
      cache_seconds: 3600
      metrics:
        - parent_table:
            usage: "LABEL"
            description: "Missing partition table name"
        - count:
            usage: "GAUGE"
            description: "Missing partition count"

    pg_max_xid_age:
      query: "SELECT max(age(datfrozenxid)) AS max_xid_age FROM pg_database WHERE datallowconn"
      master: true
      cache_seconds: 60
      metrics:
        - max_xid_age:
            usage: "GAUGE"
            description: "Maximum transaction ID age (critical for wraparound prevention)"
