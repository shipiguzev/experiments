apiVersion: "acid.zalan.do/v1"
kind: postgresql
metadata:
  name: {{ .Values.clusterName }}
  namespace: {{ .Values.namespace }}
spec:
  teamId: {{ .Values.teamId | quote }}
  volume:
    size: {{ .Values.postgresql.volumeSize }}
  numberOfInstances: {{ .Values.postgresql.numberOfInstances }}
  users:
    monitoring: []
  databases:
    {{- toYaml .Values.databases | nindent 4 }}
  {{- if .Values.preparedDatabases }}
  preparedDatabases:
    {{- toYaml .Values.preparedDatabases | nindent 4 }}
  {{- end }}
  postgresql:
    version: {{ .Values.postgresql.version | quote }}
    {{- if .Values.postgresql.parameters }}
    parameters:
      {{- toYaml .Values.postgresql.parameters | nindent 6 }}
    {{- end }}
  sidecars:
    - name: prometheus-postgres-exporter
      image: {{ .Values.sidecars.postgresExporter.image }}
      ports:
        - name: pg-exporter
          containerPort: 9187
          protocol: TCP
      resources:
        {{- toYaml .Values.sidecars.postgresExporter.resources | nindent 8 }}
      env:
        - name: CLUSTER_NAME
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: metadata.labels['cluster-name']
        - name: DATA_SOURCE_NAME
          value: >-
            host=/var/run/postgresql user=postgres
            application_name=postgres_exporter
        - name: PG_EXPORTER_CONSTANT_LABELS
          value: "release=$(CLUSTER_NAME),namespace=$(POD_NAMESPACE)"
        - name: PG_EXPORTER_EXTEND_QUERY_PATH
          value: /etc/postgres-exporter/queries.yaml
        - name: PG_EXPORTER_AUTO_DISCOVER_DATABASES
          value: "true"
    {{- if .Values.sidecars.walgExporter }}
    - name: walg-exporter
      image: {{ .Values.sidecars.walgExporter.image }}
      ports:
        - name: walg-exporter
          containerPort: 9351
          protocol: TCP
      resources:
        {{- toYaml .Values.sidecars.walgExporter.resources | nindent 8 }}
      env:
        - name: PGHOST
          value: /var/run/postgresql
        - name: PGUSER
          value: postgres
    {{- end }}
  additionalVolumes:
    - name: socket-directory
      mountPath: /var/run/postgresql
      targetContainers:
        - all
      volumeSource:
        emptyDir: {}
    - name: postgres-exporter-custom-queries
      mountPath: /etc/postgres-exporter
      targetContainers:
        - prometheus-postgres-exporter
      volumeSource:
        configMap:
          name: postgresql-exporter-custom-queries
          optional: true
    {{- if .Values.sidecars.walgExporter }}
    - name: walg
      mountPath: /run/etc
      targetContainers:
        - postgres
        - walg-exporter
      volumeSource:
        emptyDir: {}
    {{- end }}
