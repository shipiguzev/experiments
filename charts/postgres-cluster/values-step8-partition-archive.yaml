# docs/postgres-partition-archive-setup.md — CronJob that archives pg_partman partitions older
# than `retention` to a dedicated S3 bucket (pg_dump custom format via `mc pipe`), then DETACHes
# them (partman.drop_partition_time(..., p_keep_table => true)) — never DROPs. Dropping the
# detached tables afterwards is a deliberately separate follow-up, not handled by this job.
#
# Requires values-step6-partman.yaml already applied (pg_partman-managed tables must exist) and,
# before the first run, the manual steps in the doc: create the "partition-archive" bucket in
# MinIO and the "partition-archive-s3" Secret in the postgres namespace.
#
# Layer on top of all previous steps:
#   helm upgrade postgres-cluster ./charts/postgres-cluster --namespace postgres \
#     --values charts/postgres-cluster/values.yaml \
#     --values charts/postgres-cluster/values-step3-walg.yaml \
#     --values charts/postgres-cluster/values-step4-v18.yaml \
#     --values charts/postgres-cluster/values-step6-partman.yaml \
#     --values charts/postgres-cluster/values-step7-walg-exporter.yaml \
#     --values charts/postgres-cluster/values-step8-partition-archive.yaml
partitionArchive:
  enabled: true
  schedule: "0 3 * * *"
  # Kept past the Kubernetes API defaults (3 / 1) so a failure's logs survive a few more days —
  # this stack has no log aggregation (no Loki/ELK), kubectl logs against the retained Job/Pod
  # objects is the only way to see past runs.
  successfulJobsHistoryLimit: 5
  failedJobsHistoryLimit: 5
  # Passed straight to Postgres as an ::interval literal — no per-table overrides yet, applies
  # uniformly to every table found in partman.part_config.
  retention: "30 days"
  database: app
  # NOLOGIN — app_owner owns the partitioned tables but can't open a connection itself, so the
  # job authenticates as the cluster's own superuser (secret already created by the operator for
  # every cluster, same one the docs already use for manual `psql -U postgres` maintenance).
  credentialsSecret: postgres.postgres-cluster.credentials.postgresql.acid.zalan.do
  image: ghcr.io/zalando/spilo-18:4.1-p1
  mcImage: minio/mc:latest
  s3:
    endpoint: http://minio.minio.svc.cluster.local:9000
    bucket: partition-archive
    secretName: partition-archive-s3
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 250m
      memory: 512Mi
