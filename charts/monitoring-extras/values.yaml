namespace: monitoring

# All dashboards land in the "Databases" folder — requires sidecar.dashboards.folderAnnotation
# and provider.foldersFromFilesStructure: true in monitoring/vm-values.yaml (already set there).
dashboardFolder: Databases

# Panels shared across dashboards (e.g. the Patroni panels reused by both
# postgresql-cluster-overview.json and postgresql-cluster-overview-pg-exporter.json) as real
# Grafana library panels instead of duplicated JSON that silently drifts between copies. Library
# panels live in Grafana's own DB (not chart files), so this needs grafana.persistence.enabled in
# monitoring/vm-values.yaml -- without it they'd vanish on every pod restart, same as the dangling
# library-panel-refs already found and removed from postgresql-cluster-replication-pg-exporter.json.
# templates/library-panels-job.yaml upserts library-panels/*.json into Grafana via its API on
# every install/upgrade (create-or-update, keyed by filename-as-uid) — the JSON files here are the
# actual source of truth, in git like everything else.
grafanaLibraryPanels:
  url: http://vm-grafana.monitoring.svc.cluster.local:80
  adminSecretName: vm-grafana

clickhouseClusters:
  - name: chi-test
    url: http://clickhouse-chi-test.clickhouse.svc.cluster.local:8123
    username: monitoring
    password: monitoring
  - name: chi-test-2
    url: http://clickhouse-chi-test-2.clickhouse-2.svc.cluster.local:8123
    username: monitoring
    password: monitoring

imageRenderer:
  # Optional (docs/grafana-image-renderer-setup.md) — off by default, turn on with
  # --set imageRenderer.enabled=true (or a values override) once you reach that doc.
  enabled: false
  image: grafana/grafana-image-renderer:3.12.4
  port: 8081

# clickhouse-operator's own /metrics scrape (was monitoring/../vmservicescrape-clickhouse-operator.yaml).
clickhouseOperator:
  namespace: clickhouse-operator

# cloudnative-pg operator's own /metrics scrape (port 8080, no Service — see
# vmpodscrape-cnpg-operator.yaml). Needed for the vendored dashboard's "Operator Namespace"
# variable, which reads controller_runtime_webhook_requests_total from the operator pods
# themselves, not from any Cluster instance.
cnpgOperator:
  namespace: cnpg-system

# Loki deployed standalone via monitoring/loki-values.yaml (grafana/loki chart, SingleBinary mode)
# — this just wires the datasource, see docs/loki-logging-setup.md.
loki:
  url: http://loki.monitoring.svc.cluster.local:3100
