{{- range $path, $_ := .Files.Glob "dashboards/*.json" }}
{{- $name := base $path | trimSuffix ".json" }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-{{ $name }}
  namespace: {{ $.Values.namespace }}
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: {{ $.Values.dashboardFolder }}
data:
  {{ base $path }}: |
{{ $.Files.Get $path | indent 4 }}
{{- end }}
