grafana:
  enabled: true
  adminPassword: admin
  image:
    tag: "11.1.0"
  # Library panels (shared "Patroni" panels reused across postgresql-cluster-overview*
  # dashboards) live in Grafana's own DB, not in chart files -- without a PVC they're
  # lost on every pod restart, same as the dangling library-panel-refs already found
  # and removed from postgresql-cluster-replication-pg-exporter.json.
  persistence:
    enabled: true
    size: 1Gi
  plugins:
    - vertamedia-clickhouse-datasource
  env:
    GF_INSTALL_PLUGINS: "vertamedia-clickhouse-datasource 3.4.11"
    GF_RENDERING_SERVER_URL: "http://grafana-image-renderer.monitoring.svc.cluster.local:8081/render"
    GF_RENDERING_CALLBACK_URL: "http://vm-grafana.monitoring.svc.cluster.local:80/"
  sidecar:
    dashboards:
      folderAnnotation: grafana_folder
      provider:
        foldersFromFilesStructure: true
